---
namespace: miniflux
labels:
  - pairs:
      app: miniflux
    includeSelectors: true
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - cronjob_refresh.yaml
  - cronjob_cleanup.yaml
  - cluster.yaml
images:
  - name: miniflux
    newName: ghcr.io/miniflux/miniflux
    newTag: "2.2.17-distroless@sha256:4d638a4d20f7c575a5a2003707373a2c45d2e68b9b6db54b28d96d343819fee8"
  - name: miniflux-debug
    newName: ghcr.io/miniflux/miniflux
    newTag: "2.2.17@sha256:802ab7d045826d047883476e2310bf59f5d9b3875f7a8106fa0c43638d01fd64"
configMapGenerator:
  - name: env
    envs:
      - env.sh
patches:
  - target:
      kind: Deployment
      name: miniflux
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: pg-app
                key: fqdn-uri
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value:
          - configMapRef:
              name: env
replacements:
  - source:
      kind: Deployment
      name: miniflux
      fieldPath: spec.template.spec.containers.0.env
    targets:
      - select:
          kind: Deployment
          labelSelector: app=miniflux
        fieldPaths:
          - spec.template.spec.initContainers.*.env
      - select:
          kind: CronJob
          labelSelector: app=miniflux
        fieldPaths:
          - spec.jobTemplate.spec.template.spec.containers.*.env
  - source:
      kind: Deployment
      name: miniflux
      fieldPath: spec.template.spec.containers.0.envFrom
    targets:
      - select:
          kind: Deployment
          labelSelector: app=miniflux
        fieldPaths:
          - spec.template.spec.initContainers.*.envFrom
      - select:
          kind: CronJob
          labelSelector: app=miniflux
        fieldPaths:
          - spec.jobTemplate.spec.template.spec.containers.*.envFrom
replicas:
  - name: miniflux
    count: 1
